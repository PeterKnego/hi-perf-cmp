---
# Run ONE (language, local experiment) pair on node0 only. fs-write writes under
# the NVMe-backed remote_home (CWD = a scratch dir there); thread-handoff ignores
# CWD. Result lines append to results.jsonl. Included only on node0 (guarded by
# the caller's `when: node_role == "node0"`).
- name: "{{ language }}/{{ focus_area }}/{{ experiment }}: ensure NVMe scratch dir exists"
  ansible.builtin.file:
    path: "{{ remote_home }}/scratch"
    state: directory
    owner: "{{ ansible_user_id }}"
    mode: "0755"

- name: "{{ language }}/{{ focus_area }}/{{ experiment }}: run on node0, append results"
  ansible.builtin.shell: |
    export JAVA_HOME="{{ java_home.stdout }}"
    export SRC_DIR="{{ src_dir }}"
    cd {{ remote_home }}/scratch
    export FSW_DIR="{{ remote_home }}/scratch"
    export FSW_ENTRY_BYTES="{{ fsw_entry_bytes }}"
    export FSW_WARMUP="{{ fsw_warmup }}"
    export FSW_ITERATIONS="{{ fsw_iterations }}"
    export FSW_BATCH="{{ fsw_batch }}"
    export TH_WARMUP="{{ th_warmup }}"
    export TH_ITERATIONS="{{ th_iterations }}"
    export TH_RING_CAP="{{ th_ring_cap }}"
    export SER_WARMUP="{{ ser_warmup }}"
    export SER_ITERS="{{ ser_iterations }}"
    export SER_ENTRIES="{{ ser_entries }}"
    export SER_CMD_BYTES="{{ ser_cmd_bytes }}"
    export SMRC_CAP="{{ smrc_cap }}"
    export SMRC_LEVELS="{{ smrc_levels }}"
    export SMRC_TICK="{{ smrc_tick }}"
    export SMRC_PRICE_MIN="{{ smrc_price_min }}"
    export SMRC_STEADY="{{ smrc_steady }}"
    export SMRC_WARMUP="{{ smrc_warmup }}"
    export SMRC_ITERS="{{ smrc_iters }}"
    {{ remote_home }}/run_bench.sh {{ language }} {{ focus_area }} {{ experiment }} loopback \
      >> {{ remote_results_dir }}/results.jsonl
  args:
    executable: /bin/bash
  changed_when: true
