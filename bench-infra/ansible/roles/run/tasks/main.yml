---
# Reset results state on node0 so re-runs start fresh.
- name: Reset results dir on node0
  ansible.builtin.shell: |
    rm -rf {{ remote_results_dir }}
    mkdir -p {{ remote_results_dir }}
  args:
    executable: /bin/bash
  changed_when: false
  when: node_role == "node0"

- name: Ensure results dir is owned by the run user (node0)
  ansible.builtin.file:
    path: "{{ remote_results_dir }}"
    state: directory
    owner: "{{ ansible_user_id }}"
    mode: "0755"
  when: node_role == "node0"

# Kill any stray benchmark processes left from a previous run on BOTH nodes.
# Bracket trick on the pattern so it doesn't match pkill's own command line.
# Patterns are prefixes, so they cover every per-experiment artifact
# (network-rtt-tcp/udp/quic) and the java networkrtt.<exp>.Main main classes.
- name: Clean stale benchmark processes (all nodes)
  ansible.builtin.shell: |
    pkill -9 -f '[t]arget/release/network-rtt' || true
    pkill -9 -f '[b]in/network-rtt' || true
    pkill -9 -f '[n]etworkrtt\.' || true
  changed_when: false

- name: Ship run_bench.sh to every node
  ansible.builtin.copy:
    src: run_bench.sh
    dest: "{{ remote_home }}/run_bench.sh"
    mode: "0755"

- name: Detect JAVA_HOME on every node (for the java runs)
  ansible.builtin.shell: "dirname $(dirname $(readlink -f $(which javac)))"
  register: java_home
  changed_when: false

# --- cross_host experiments: server on node1, client on node0, per language ---
# One (language, experiment) pair at a time, sequentially, so the fixed RTT/RPC
# ports are never contended across experiments. A row's optional `languages`
# key (e.g. rpc-roundtrip: sbe_udp is Rust-only, grpc/bebop_tcp are Go-only)
# restricts the (language, experiment) product to that subset, same as the
# local loop below; rows without it run for every entry in `languages` above.
- name: Run cross_host experiments per language, sequentially
  ansible.builtin.include_tasks: cross_host.yml
  loop: "{{ languages | product(experiments | selectattr('kind', 'equalto', 'cross_host') | list) | list }}"
  loop_control:
    loop_var: combo
  when: combo.1.languages is not defined or combo.0 in combo.1.languages
  vars:
    language: "{{ combo.0 }}"
    focus_area: "{{ combo.1.focus_area }}"
    experiment: "{{ combo.1.experiment }}"

# --- local experiments: run on node0 only ---
# A row's optional `languages` key restricts which languages run it
# (serialization rows are per-language: Rust or Go); rows without it run for
# every entry in `languages` as before.
- name: Run local experiments per language (node0 only)
  ansible.builtin.include_tasks: local.yml
  loop: "{{ languages | product(experiments | selectattr('kind', 'equalto', 'local') | list) | list }}"
  loop_control:
    loop_var: combo
  vars:
    language: "{{ combo.0 }}"
    focus_area: "{{ combo.1.focus_area }}"
    experiment: "{{ combo.1.experiment }}"
  when: node_role == "node0" and (combo.1.languages is not defined or combo.0 in combo.1.languages)
