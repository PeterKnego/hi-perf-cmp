---
# --- Benchmark matrix ---
languages: [rust, go, java]
# The matrix is experiment × language within a focus area. Each row is one
# (focus_area, experiment): cross_host runs a node1 responder + node0 client;
# local runs on node0 only. thread-handoff is single-host: spin/condvar/channel
# measure round-trip handoff latency, ring measures pipelined SPSC throughput.
experiments:
  - { focus_area: network-rtt,      experiment: tcp,         kind: cross_host }
  - { focus_area: network-rtt,      experiment: udp,         kind: cross_host }
  - { focus_area: network-rtt,      experiment: quic,        kind: cross_host }
  - { focus_area: filesystem-write, experiment: fsync,       kind: local }
  - { focus_area: filesystem-write, experiment: fdatasync,   kind: local }
  - { focus_area: filesystem-write, experiment: prealloc,    kind: local }
  - { focus_area: filesystem-write, experiment: batch,       kind: local }
  - { focus_area: thread-handoff,   experiment: spin,        kind: local }
  - { focus_area: thread-handoff,   experiment: condvar,     kind: local }
  - { focus_area: thread-handoff,   experiment: channel,     kind: local }
  - { focus_area: thread-handoff,   experiment: ring,        kind: local }
  # serialization is Rust + Go (Java not planned): the optional `languages` key
  # restricts which languages the (language, experiment) product loop runs this
  # row for (see ansible/roles/run/tasks/main.yml) — each row below names its
  # own language. Rows without `languages` run for all of `languages` above,
  # unchanged.
  - { focus_area: serialization,    experiment: sbe_gen,     kind: local, languages: [rust] }
  - { focus_area: serialization,    experiment: aeron_sbe,   kind: local, languages: [rust] }
  - { focus_area: serialization,    experiment: bincode,     kind: local, languages: [rust] }
  - { focus_area: serialization,    experiment: bebop,       kind: local, languages: [go] }
  - { focus_area: serialization,    experiment: protobuf,    kind: local, languages: [go] }
  - { focus_area: smr-collections,  experiment: insert,      kind: local }
  - { focus_area: smr-collections,  experiment: update,      kind: local }
  - { focus_area: smr-collections,  experiment: snapshot,    kind: local }

# --- network-rtt cross-host params (exported into every client run so all three
#     languages use identical parameters for a fair comparison) ---
rtt_payload_bytes: 64
rtt_warmup: 10000
rtt_iterations: 100000
rtt_tcp_port: 9100
rtt_udp_port: 9101
rtt_quic_port: 9102

# --- filesystem-write params (exported into every local fs-write run so all
#     three languages use identical parameters for a fair comparison) ---
fsw_entry_bytes: 256
fsw_warmup: 5000
fsw_iterations: 50000
fsw_batch: 32

# thread-handoff params (single-host, node0). Identical across languages.
th_warmup: 10000
th_iterations: 100000
th_ring_cap: 1024

# --- serialization params (single-host, node0). Five experiments over one
#     shared ~500-byte journal record: sbe_gen, aeron_sbe, bincode (Rust) and
#     bebop, protobuf (Go); ser_* params are shared by all five. aeron_sbe
#     ships a committed generated crate + vendored jar, and the Go bebop/
#     protobuf cells ship committed generated code too, so NO JDK/protoc/
#     generator is needed at bench time (only regen.sh regenerates it). ---
ser_warmup: 1000
ser_iterations: 100000
ser_entries: 4
ser_cmd_bytes: 78

# smr-collections params (single-host, node0). Identical across languages.
smrc_cap: 262144
smrc_levels: 1024
smrc_tick: 1
smrc_price_min: 0
smrc_steady: 60000
smrc_warmup: 10000
smrc_iters: 100000

# --- Toolchain versions ---
jdk_version: "21"
go_version: "1.22.5"   # official tarball: go<ver>.linux-amd64.tar.gz

# --- Build source (rsync the local working tree = repo root) ---
src_local_path: "{{ playbook_dir }}/../.."   # the hi-perf-cmp repo root

# --- Layout on hosts ---
remote_home: "/opt/bench"
src_dir: "/opt/bench/src"
go_root: "/usr/local/go"

# --- Results ---
results_local_dir: "{{ playbook_dir }}/../../bench-out/dist"
remote_results_dir: "{{ remote_home }}/results"
