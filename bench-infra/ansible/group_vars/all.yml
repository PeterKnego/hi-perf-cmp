---
# --- Benchmark matrix ---
languages: [rust, go, java]
# The matrix is experiment × language within a focus area. Each row is one
# (focus_area, experiment): cross_host runs a node1 responder + node0 client;
# local runs on node0 only. thread-handoff is still a stub with a single
# 'placeholder' experiment until real experiments are defined.
experiments:
  - { focus_area: network-rtt,      experiment: tcp,         kind: cross_host }
  - { focus_area: network-rtt,      experiment: udp,         kind: cross_host }
  - { focus_area: network-rtt,      experiment: quic,        kind: cross_host }
  - { focus_area: filesystem-write, experiment: fsync,       kind: local }
  - { focus_area: filesystem-write, experiment: fdatasync,   kind: local }
  - { focus_area: filesystem-write, experiment: prealloc,    kind: local }
  - { focus_area: filesystem-write, experiment: batch,       kind: local }
  - { focus_area: thread-handoff,   experiment: placeholder, kind: local }

# --- network-rtt cross-host params (exported into every client run so all three
#     languages use identical parameters for a fair comparison) ---
rtt_payload_bytes: 64
rtt_warmup: 10000
rtt_iterations: 100000
rtt_tcp_port: 9100
rtt_udp_port: 9101
rtt_quic_port: 9102

# --- filesystem-write params (exported into every local fs-write run so all
#     three languages use identical parameters for a fair comparison) ---
fsw_entry_bytes: 256
fsw_warmup: 5000
fsw_iterations: 50000
fsw_batch: 32

# --- Toolchain versions ---
jdk_version: "21"
go_version: "1.22.5"   # official tarball: go<ver>.linux-amd64.tar.gz

# --- Build source (rsync the local working tree = repo root) ---
src_local_path: "{{ playbook_dir }}/../.."   # the hi-perf-cmp repo root

# --- Layout on hosts ---
remote_home: "/opt/bench"
src_dir: "/opt/bench/src"
go_root: "/usr/local/go"

# --- Results ---
results_local_dir: "{{ playbook_dir }}/../../bench-out/dist"
remote_results_dir: "{{ remote_home }}/results"
